<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>มะหฺรอมเช็ค</title>
  <meta name="description" content="ตรวจสอบความเป็นมะหฺรอมตามหลักอิสลาม">
  <meta name="theme-color" content="#d4a853">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <!-- GENDER SCREEN -->
  <div id="genderScreen">
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="logo-wrap"><div class="logo">🤝</div></div>
    <h1 class="title">มะหฺรอมเช็ค</h1>
    <p class="subtitle-ar">فحص المحرم</p>
    <p class="subtitle">ตรวจสอบว่าจับมือสลามกันได้ไหม</p>
    <p class="gender-label">เลือกเพศของคุณ</p>
    <div class="gender-buttons">
      <button class="gender-btn" onclick="selectGender('male')"><div class="sym"><img src="/icons/male.png" alt="ผู้ชาย" width="80" height="80"></div><div class="lbl">ผู้ชาย</div></button>
      <button class="gender-btn" onclick="selectGender('female')"><div class="sym"><img src="/icons/female.png" alt="ผู้หญิง" width="80" height="80"></div><div class="lbl">ผู้หญิง</div></button>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()"><span style="font-size:18px">‹</span> กลับ</button>
      <div class="topbar-title"><span style="color:var(--accent)">🤝</span> มะหฺรอมเช็ค</div>
      <span class="topbar-badge" id="genderBadge"></span>
    </div>
    <div class="content">
      <div class="search-card">
        <div class="search-label">พิมพ์ความสัมพันธ์ที่ต้องการตรวจสอบ</div>
        <div class="search-row">
          <input type="text" id="inputField" class="search-input" placeholder="เช่น พี่ชายของแม่, ลุง..." autocomplete="off">
          <button class="check-btn" id="checkBtn" onclick="doCheck()">เช็ค</button>
        </div>
        <div id="autocompleteList" class="autocomplete-list"></div>
      </div>
      <div class="quick-section">
        <div id="quickTags"></div>
      </div>
      <div id="loadingArea" class="loading hidden">
        <div class="loading-box"></div>
        <p id="loadingText">กำลังตรวจสอบ...</p>
      </div>
      <div id="resultArea" class="hidden"></div>
      <div id="shareArea" class="hidden">
        <button class="share-btn" onclick="shareResult()">📤 แชร์ผลลัพธ์</button>
      </div>
      <div id="historyArea" class="hidden" style="margin-top:8px">
        <div class="history-header">
          <button class="history-toggle" onclick="toggleHistory()">
            <span class="arrow" id="histArrow">›</span> ประวัติ (<span id="histCount">0</span>)
          </button>
          <button class="history-clear" onclick="clearHistory()">🗑 ลบทั้งหมด</button>
        </div>
        <div class="history-list hidden" id="historyList"></div>
      </div>
      <div class="disclaimer">เครื่องมือช่วยเบื้องต้น อ้างอิงหลักฟิกฮ์ทั่วไป — หากสงสัยปรึกษาอุละมาอฺ</div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
