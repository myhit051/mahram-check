<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>มะหฺรอมเช็ค</title>
  <meta name="description" content="ตรวจสอบความเป็นมะหฺรอมตามหลักอิสลาม">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8f5f0;--surface:#ffffff;--surface-alt:#faf8f5;
      --border:#e8e2da;--border-light:#f0ebe4;
      --text:#2c2420;--text-sec:#8a7e74;--text-ter:#b5a99e;
      --accent:#d4a853;--accent-dark:#b8903e;--accent-light:#f5ecd4;
      --green:#3a9e6e;--green-bg:#eef8f2;--green-border:#c4e8d4;
      --red:#d45555;--red-bg:#fdf0f0;--red-border:#f0c8c8;
      --gray-bg:#f5f2ee;--gray-border:#ddd8d0;
    }
    body{
      font-family:'IBM Plex Sans Thai',sans-serif;
      background:linear-gradient(160deg,#fdf9f3 0%,#f0e8dc 40%,#e8ddd0 100%);
      color:var(--text);min-height:100vh;min-height:100dvh;
      overflow-x:hidden;-webkit-font-smoothing:antialiased;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.85)}60%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    .container{max-width:480px;margin:0 auto;position:relative;z-index:1}

    /* Gender Screen */
    #genderScreen{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:90vh;min-height:90dvh;text-align:center;padding:24px;position:relative;
    }
    .deco-circle{position:absolute;border-radius:50%;pointer-events:none}
    .deco-1{top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,#d4a85320,transparent 70%)}
    .deco-2{bottom:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,#d4a85315,transparent 70%)}

    .logo-wrap{animation:float 3s ease-in-out infinite;margin-bottom:32px}
    .logo{
      width:88px;height:88px;margin:0 auto;border-radius:28px;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      display:flex;align-items:center;justify-content:center;
      font-size:40px;color:#fff;box-shadow:0 12px 40px #d4a85340;transform:rotate(-3deg);
    }
    .title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px}
    .subtitle-ar{font-family:'Noto Naskh Arabic',serif;font-size:16px;color:var(--text-sec);margin-bottom:4px;direction:rtl}
    .subtitle{font-size:14px;color:var(--text-sec);margin-bottom:44px;line-height:1.7}
    .gender-label{font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:16px;text-transform:uppercase;letter-spacing:2px}
    .gender-buttons{display:flex;gap:14px;width:100%;max-width:320px}
    .gender-btn{
      flex:1;padding:28px 16px;border-radius:20px;border:none;
      background:var(--surface);cursor:pointer;font-family:inherit;
      box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.04);
      transition:all 0.25s cubic-bezier(.4,0,.2,1);
    }
    .gender-btn:hover,.gender-btn:active{
      transform:translateY(-4px);
      box-shadow:0 8px 30px #d4a85325,0 0 0 2px #d4a85340;
    }
    .gender-btn .sym{font-size:32px;margin-bottom:10px;color:var(--accent)}
    .gender-btn .lbl{font-size:16px;font-weight:600;color:var(--text)}

    /* Main Screen */
    #mainScreen{display:none}
    .topbar{
      position:sticky;top:0;z-index:10;padding:14px 20px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border-light);
    }
    .back-btn{background:none;border:none;color:var(--text-sec);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
    .topbar-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--text)}
    .topbar-badge{font-size:12px;background:var(--accent-light);border-radius:20px;padding:4px 12px;color:var(--accent-dark);font-weight:600}

    .content{padding:24px 20px 120px}

    /* Search */
    .search-card{
      background:var(--surface);border-radius:24px;padding:20px;margin-bottom:20px;
      box-shadow:0 2px 16px rgba(0,0,0,0.05);border:1px solid var(--border-light);
    }
    .search-label{font-size:13px;color:var(--text-sec);margin-bottom:14px;font-weight:500}
    .search-row{display:flex;gap:10px}
    .search-input{
      flex:1;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);
      background:var(--surface-alt);color:var(--text);font-size:16px;outline:none;
      font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;
    }
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #d4a85315}
    .search-input::placeholder{color:var(--text-ter)}
    .check-btn{
      padding:14px 22px;border-radius:14px;border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:#fff;font-size:15px;font-weight:600;cursor:pointer;
      font-family:inherit;transition:all 0.2s;box-shadow:0 4px 16px #d4a85340;
      white-space:nowrap;
    }
    .check-btn:disabled{background:var(--border);color:var(--text-ter);box-shadow:none;cursor:not-allowed}

    /* Quick tags */
    .quick-section{margin-bottom:28px}
    .quick-label{font-size:11px;color:var(--text-ter);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
    .quick-tags{display:flex;flex-wrap:wrap;gap:8px}
    .quick-tag{
      padding:7px 14px;border-radius:24px;border:1px solid var(--border);
      background:var(--surface);color:var(--text-sec);font-size:13px;
      cursor:pointer;font-family:inherit;transition:all 0.15s;
    }
    .quick-tag:hover,.quick-tag:active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark)}

    /* Loading */
    .loading{text-align:center;padding:48px 20px;animation:slideUp 0.3s ease}
    .loading-box{
      width:40px;height:40px;margin:0 auto 16px;border-radius:12px;
      background:linear-gradient(135deg,#d4a85320,#d4a85340);
      background-size:200% 100%;animation:shimmer 1.5s linear infinite;
    }
    .loading p{font-size:14px;color:var(--text-sec);margin:0}

    /* Result */
    .result-wrap{animation:popIn 0.4s cubic-bezier(.4,0,.2,1);margin-bottom:28px}
    .result-banner{
      border-radius:24px;padding:32px 24px 28px;text-align:center;
    }
    .result-banner.mahram{background:var(--green-bg);border:1.5px solid var(--green-border)}
    .result-banner.not-mahram{background:var(--red-bg);border:1.5px solid var(--red-border)}
    .result-banner.unknown{background:var(--gray-bg);border:1.5px solid var(--gray-border)}
    .result-icon{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.1))}
    .result-status{font-size:18px;font-weight:700;margin-bottom:6px}
    .result-status.mahram{color:var(--green)}
    .result-status.not-mahram{color:var(--red)}
    .result-status.unknown{color:var(--text-sec)}
    .result-sub{font-size:13px;color:var(--text-sec)}

    .detail-card{
      background:var(--surface);border-radius:20px;padding:20px;margin-top:12px;
      box-shadow:0 1px 8px rgba(0,0,0,0.04);border:1px solid var(--border-light);
    }
    .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .detail-label{font-size:13px;color:var(--text-ter);font-weight:500}
    .detail-type{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent-dark);font-weight:600}
    .detail-query{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
    .detail-reason{font-size:14px;color:var(--text-sec);line-height:1.8;margin-top:12px}
    .quran-ref{
      margin-top:16px;padding:12px 14px;border-radius:12px;
      background:var(--surface-alt);font-size:12px;color:var(--text-sec);
      line-height:1.6;border-left:3px solid var(--accent);
    }
    .source-badge{margin-top:14px;text-align:center;font-size:11px;color:var(--text-ter)}

    /* Share */
    .share-btn{
      display:block;width:100%;padding:14px;border-radius:14px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text);font-size:14px;font-weight:500;cursor:pointer;
      font-family:inherit;margin-top:12px;transition:all 0.2s;
    }
    .share-btn:hover{border-color:var(--accent);background:var(--accent-light)}

    /* History */
    .history-toggle{
      background:none;border:none;font-size:13px;color:var(--text-sec);
      cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;padding:8px 0;
    }
    .history-toggle .arrow{transition:transform 0.2s;display:inline-block}
    .history-toggle .arrow.open{transform:rotate(90deg)}
    .history-list{display:flex;flex-direction:column;gap:6px;animation:slideUp 0.2s ease}
    .history-item{
      display:flex;align-items:center;gap:12px;padding:12px 16px;
      background:var(--surface);border:1px solid var(--border-light);
      border-radius:14px;font-size:14px;cursor:pointer;transition:all 0.15s;
      text-align:left;width:100%;font-family:inherit;color:var(--text);
    }
    .history-item:hover{border-color:var(--accent)}
    .history-icon{font-size:16px;flex-shrink:0}
    .history-text{flex:1}
    .history-src{font-size:10px;color:var(--text-ter)}

    /* Disclaimer */
    .disclaimer{
      margin-top:36px;padding:14px 18px;border-radius:16px;
      background:var(--surface-alt);border:1px solid var(--border-light);
      font-size:12px;color:var(--text-ter);line-height:1.7;text-align:center;
    }
    .hidden{display:none!important}
  </style>
</head>
<body>
<div class="container">

  <!-- GENDER SCREEN -->
  <div id="genderScreen">
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="logo-wrap"><div class="logo">☪</div></div>
    <h1 class="title">มะหฺรอมเช็ค</h1>
    <p class="subtitle-ar">فحص المحرم</p>
    <p class="subtitle">ตรวจสอบว่าจับมือสลามกันได้ไหม</p>
    <p class="gender-label">เลือกเพศของคุณ</p>
    <div class="gender-buttons">
      <button class="gender-btn" onclick="selectGender('male')"><div class="sym">♂</div><div class="lbl">ผู้ชาย</div></button>
      <button class="gender-btn" onclick="selectGender('female')"><div class="sym">♀</div><div class="lbl">ผู้หญิง</div></button>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()"><span style="font-size:18px">‹</span> กลับ</button>
      <div class="topbar-title"><span style="color:var(--accent)">☪</span> มะหฺรอมเช็ค</div>
      <span class="topbar-badge" id="genderBadge"></span>
    </div>
    <div class="content">
      <div class="search-card">
        <div class="search-label">พิมพ์ความสัมพันธ์ที่ต้องการตรวจสอบ</div>
        <div class="search-row">
          <input type="text" id="inputField" class="search-input" placeholder="เช่น พี่ชายของแม่, ลุง..." onkeydown="if(event.key==='Enter')doCheck()">
          <button class="check-btn" id="checkBtn" onclick="doCheck()">เช็ค</button>
        </div>
      </div>
      <div class="quick-section">
        <div class="quick-label">ตัวอย่าง</div>
        <div class="quick-tags" id="quickTags"></div>
      </div>
      <div id="loadingArea" class="loading hidden">
        <div class="loading-box"></div>
        <p id="loadingText">กำลังตรวจสอบ...</p>
      </div>
      <div id="resultArea" class="hidden"></div>
      <div id="shareArea" class="hidden">
        <button class="share-btn" onclick="shareResult()">📤 แชร์ผลลัพธ์</button>
      </div>
      <div id="historyArea" class="hidden" style="margin-top:8px">
        <button class="history-toggle" onclick="toggleHistory()">
          <span class="arrow" id="histArrow">›</span> ประวัติ (<span id="histCount">0</span>)
        </button>
        <div class="history-list hidden" id="historyList"></div>
      </div>
      <div class="disclaimer">เครื่องมือช่วยเบื้องต้น อ้างอิงหลักฟิกฮ์ทั่วไป — หากสงสัยปรึกษาอุละมาอฺ</div>
    </div>
  </div>
</div>

{re:/(?:พี่สาว|พี่).*(?:ของ\s*)?แม่/,g:"male",r:{mahram:true,type:NASAB,reason:"ป้า/น้าสาวฝั่งแม่ (الخالة) เป็นมะหฺรอมตลอดกาล"}},
{re:/(?:น้องสาว|น้อง).*(?:ของ\s*)?แม่/,g:"male",r:{mahram:true,type:NASAB,reason:"น้าสาวฝั่งแม่ (الخالة) เป็นมะหฺรอมตลอดกาล"}},
{re:/ลูกชาย.*(?:ของ\s*)?(?:พี่ชาย|พี่สาว|น้องชาย|น้องสาว)/,g:"female",r:{mahram:true,type:NASAB,reason:"หลานชาย (ลูกชายพี่น้อง) เป็นมะหฺรอมตลอดกาล"}},
{re:/ลูกสาว.*(?:ของ\s*)?(?:พี่ชาย|พี่สาว|น้องชาย|น้องสาว)/,g:"male",r:{mahram:true,type:NASAB,reason:"หลานสาว (ลูกสาวพี่น้อง) เป็นมะหฺรอมตลอดกาล"}},
{re:/ลูก.*(?:ของ\s*)?(?:ลุง|ป้า|น้า|อา)/,g:"both",r:{mahram:false,type:NOT_MAHRAM,reason:"ลูกพี่ลูกน้อง ไม่ใช่มะหฺรอม"}},
{re:/สามี.*(?:ของ\s*)?(?:พี่สาว|น้องสาว|ป้า|น้า|อา)/,g:"female",r:{mahram:false,type:NOT_MAHRAM,reason:"สามีของญาติฝ่ายหญิง ไม่ใช่มะหฺรอม"}},
{re:/ภรรยา.*(?:ของ\s*)?(?:พี่ชาย|น้องชาย|ลุง|น้า|อา)|เมีย.*(?:ของ\s*)?(?:พี่ชาย|น้องชาย)/,g:"male",r:{mahram:false,type:NOT_MAHRAM,reason:"ภรรยาของญาติฝ่ายชาย ไม่ใช่มะหฺรอม"}},
{re:/(?:พี่ชาย|น้องชาย|พี่|น้อง).*(?:ของ\s*)?(?:สามี|ผัว)/,g:"female",r:{mahram:false,type:NOT_MAHRAM,reason:"พี่น้องชายสามี ไม่ใช่มะหฺรอม 'พี่น้องสามีคือความตาย' (อัลบุคอรีย์)"}},
{re:/(?:พี่สาว|น้องสาว|พี่|น้อง).*(?:ของ\s*)?(?:ภรรยา|เมีย)/,g:"male",r:{mahram:false,type:NOT_MAHRAM,reason:"พี่น้องสาวภรรยา ไม่ใช่มะหฺรอม"}},
{re:/(?:พ่อ|บิดา).*(?:ของ\s*)?(?:สามี|ผัว)/,g:"female",r:{mahram:true,type:MUSAHARAH,reason:"พ่อสามี เป็นมะหฺรอมจากการสมรส"}},
{re:/(?:แม่|มารดา).*(?:ของ\s*)?(?:ภรรยา|เมีย)/,g:"male",r:{mahram:true,type:MUSAHARAH,reason:"แม่ภรรยา เป็นมะหฺรอมจากการสมรส"}},
{re:/ลูก(?:ชาย)?.*(?:ของ\s*)?(?:สามี|ผัว)/,g:"female",r:{mahram:true,type:MUSAHARAH,reason:"ลูกชายของสามี เป็นมะหฺรอมจากการสมรส"}},
{re:/ลูก(?:สาว)?.*(?:ของ\s*)?(?:ภรรยา|เมีย)/,g:"male",r:{mahram:true,type:MUSAHARAH,reason:"ลูกสาวของภรรยา เป็นมะหฺรอมจากการสมรส"}},
{re:/ลูกชาย.*(?:ของ\s*)?(?:ลูกชาย|ลูกสาว)/,g:"female",r:{mahram:true,type:NASAB,reason:"หลานชาย เป็นมะหฺรอมตลอดกาล"}},
{re:/ลูกสาว.*(?:ของ\s*)?(?:ลูกชาย|ลูกสาว)/,g:"male",r:{mahram:true,type:NASAB,reason:"หลานสาว เป็นมะหฺรอมตลอดกาล"}},
{re:/(?:พ่อ|บิดา).*(?:ของ\s*)?(?:พ่อ|แม่)/,g:"female",r:{mahram:true,type:NASAB,reason:"ปู่/ตา (الجد) เป็นมะหฺรอมตลอดกาล"}},
{re:/(?:แม่|มารดา).*(?:ของ\s*)?(?:พ่อ|แม่)/,g:"male",r:{mahram:true,type:NASAB,reason:"ย่า/ยาย (الجدة) เป็นมะหฺรอมตลอดกาล"}},
];for(const p of P){if((p.g==="both"||p.g===g)&&p.re.test(n))return p.r;}return null;}

function check(gender,input){
  const db=gender==="female"?FDB:MDB;const n=norm(input);
  const ofC=(n.match(/ของ/g)||[]).length;
  const hasSp=/สามี|ผัว|ภรรยา|เมีย/.test(n);
  const compound=ofC>=2||n.length>15||(ofC>=1&&hasSp);
  if(compound){const p=patMatch(gender,input);if(p)return p;}
  const d=findDB(db,input);if(d)return{mahram:d.m,type:d.t,reason:d.r};
  if(!compound){const p=patMatch(gender,input);if(p)return p;}
  return null;
}

// ========== AI FALLBACK ==========
async function aiCheck(gender,input){
  try{const r=await fetch("/api/mahram",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({gender,input})});if(!r.ok)throw 0;return await r.json();}catch{return null;}
}

// ========== UI ==========
const QF=["พ่อ","พี่ชาย","ลุง","น้าชาย","ลูกพี่ลูกน้อง","พี่ชายของสามี","พ่อสามี","สามีของป้า","ลูกชายของพี่สาว","พี่เขย"];
const QM=["แม่","พี่สาว","ป้า","น้าสาว","ลูกพี่ลูกน้อง","พี่สาวของภรรยา","แม่ยาย","ลูกสาวของพี่ชาย","น้องสะใภ้","ลูกสะใภ้"];

function selectGender(g){
  currentGender=g;
  document.getElementById("genderScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  document.getElementById("genderBadge").textContent=g==="female"?"♀ หญิง":"♂ ชาย";
  document.getElementById("inputField").placeholder=g==="female"?"เช่น พี่ชายของแม่, ลุง...":"เช่น พี่สาวของพ่อ, ป้า...";
  renderTags();setTimeout(()=>document.getElementById("inputField").focus(),300);
}
function goBack(){
  currentGender=null;currentResult=null;currentInput="";history=[];historyOpen=false;
  document.getElementById("genderScreen").style.display="";
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("inputField").value="";
  hide("resultArea");hide("shareArea");hide("historyArea");
}
function renderTags(){
  const tags=currentGender==="female"?QF:QM;
  document.getElementById("quickTags").innerHTML=tags.map(t=>`<button class="quick-tag" onclick="setInp('${t}')">${t}</button>`).join("");
}
function setInp(t){document.getElementById("inputField").value=t;hide("resultArea");hide("shareArea");document.getElementById("inputField").focus();}

async function doCheck(){
  const inp=document.getElementById("inputField").value.trim();
  if(!inp||!currentGender)return;currentInput=inp;
  hide("resultArea");hide("shareArea");show("loadingArea");
  document.getElementById("checkBtn").disabled=true;
  document.getElementById("loadingText").textContent="กำลังตรวจสอบ...";

  let res=check(currentGender,inp),src="rule";
  if(!res){
    document.getElementById("loadingText").textContent="AI กำลังวิเคราะห์...";
    res=await aiCheck(currentGender,inp);src=res?"ai":"error";
    if(!res)res={mahram:null,type:"ไม่สามารถระบุได้",reason:"ลองพิมพ์ใหม่ เช่น 'พี่ชายของแม่'"};
  }
  currentResult={...res,source:src,input:inp};
  history.unshift(currentResult);if(history.length>15)history.pop();
  hide("loadingArea");document.getElementById("checkBtn").disabled=false;
  renderResult(res,src,inp);renderHist();
}

function renderResult(res,src,inp){
  const cls=res.mahram===true?"mahram":res.mahram===false?"not-mahram":"unknown";
  const icon=res.mahram===true?"🤝":res.mahram===false?"🚫":"❓";
  const st=res.mahram===true?"เป็นมะหฺรอม":res.mahram===false?"ไม่เป็นมะหฺรอม":"ไม่สามารถระบุได้";
  const sub=res.mahram===true?"จับมือสลามกันได้":res.mahram===false?"ไม่อนุญาตให้สัมผัส":"กรุณาลองอีกครั้ง";
  const showQ=res.type&&res.type!==NOT_MAHRAM&&res.type!==SPOUSE&&res.type!=="ไม่สามารถระบุได้";

  document.getElementById("resultArea").innerHTML=`
    <div class="result-wrap">
      <div class="result-banner ${cls}">
        <div class="result-icon">${icon}</div>
        <div class="result-status ${cls}">${st}</div>
        <div class="result-sub">${sub}</div>
      </div>
      <div class="detail-card">
        <div class="detail-header">
          <span class="detail-label">รายละเอียด</span>
          <span class="detail-type">${res.type}</span>
        </div>
        <div class="detail-query">"${inp}"</div>
        <div class="detail-reason">${res.reason}</div>
        ${showQ?'<div class="quran-ref">📖 อ้างอิง: ซูเราะฮฺ อันนิซาอฺ (4:23)</div>':''}
        <div class="source-badge">${src==="rule"?"📚 ฐานข้อมูล":src==="ai"?"🤖 AI (Gemini)":""}</div>
      </div>
    </div>`;
  show("resultArea");show("shareArea");
  document.getElementById("resultArea").scrollIntoView({behavior:"smooth",block:"nearest"});
}

function renderHist(){
  if(!history.length){hide("historyArea");return;}
  show("historyArea");document.getElementById("histCount").textContent=history.length;
  const list=document.getElementById("historyList");
  list.innerHTML=history.map((it,i)=>{
    const ic=it.mahram===true?"🤝":it.mahram===false?"🚫":"❓";
    return`<button class="history-item" onclick="replay(${i})"><span class="history-icon">${ic}</span><span class="history-text">${it.input}</span><span class="history-src">${it.source==="rule"?"📚":"🤖"}</span></button>`;
  }).join("");
  if(historyOpen)list.classList.remove("hidden");
}
function toggleHistory(){
  historyOpen=!historyOpen;
  document.getElementById("historyList").classList.toggle("hidden",!historyOpen);
  document.getElementById("histArrow").classList.toggle("open",historyOpen);
}
function replay(i){const it=history[i];if(!it)return;document.getElementById("inputField").value=it.input;renderResult(it,it.source,it.input);}

function shareResult(){
  if(!currentResult)return;
  const ic=currentResult.mahram===true?"🤝":currentResult.mahram===false?"🚫":"❓";
  const st=currentResult.mahram===true?"เป็นมะหฺรอม — จับมือสลามได้":currentResult.mahram===false?"ไม่เป็นมะหฺรอม — ไม่อนุญาตให้สัมผัส":"ไม่สามารถระบุได้";
  const txt=`${ic} มะหฺรอมเช็ค\n\nตรวจสอบ: "${currentResult.input}"\nผลลัพธ์: ${st}\nประเภท: ${currentResult.type}\nเหตุผล: ${currentResult.reason}`;
  if(liffReady&&liff.isInClient()){liff.shareTargetPicker([{type:"text",text:txt}]).catch(()=>fallback(txt));}else{fallback(txt);}
}
function fallback(txt){if(navigator.share){navigator.share({title:"มะหฺรอมเช็ค",text:txt}).catch(()=>{});}else{navigator.clipboard.writeText(txt).then(()=>alert("คัดลอกแล้ว!")).catch(()=>{});}}

function show(id){document.getElementById(id).classList.remove("hidden");}
function hide(id){document.getElementById(id).classList.add("hidden");}
</script>
